<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noida Property Scraper — Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
      --toggle-off: #3a3d4a;
      --toggle-on: #6366f1;
    }
    .light {
      --bg: #f4f4f6;
      --card: #ffffff;
      --border: #d4d4d8;
      --text: #18181b;
      --muted: #71717a;
      --toggle-off: #c4c4c8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }
    .header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .stats { display: flex; gap: 16px; padding: 16px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; min-width: 120px; }
    .stat .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat .value { font-size: 24px; font-weight: 700; margin-top: 2px; }
    .filters { display: flex; gap: 12px; padding: 16px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
    .filters label { color: var(--muted); font-size: 12px; display: block; margin-bottom: 4px; }
    .filters select, .filters input { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; padding: 24px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: border-color 0.15s; }
    .card:hover { border-color: var(--accent); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .card-price { font-size: 20px; font-weight: 700; color: var(--green); }
    .card-site { font-size: 11px; background: var(--border); padding: 2px 8px; border-radius: 4px; color: var(--muted); }
    .card-title { font-size: 14px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .tag { font-size: 11px; background: rgba(99,102,241,0.15); color: var(--accent); padding: 3px 8px; border-radius: 4px; }
    .card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    .card-footer a { color: var(--accent); font-size: 12px; text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }
    .card-footer .date { color: var(--muted); font-size: 11px; }
    .empty { text-align: center; padding: 60px 24px; color: var(--muted); }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; padding: 16px; } }

    .toggles { display: flex; gap: 6px; flex-wrap: wrap; }
    .toggle-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; user-select: none; }
    .toggle-wrap input { display: none; }
    .toggle-track { width: 32px; height: 18px; background: var(--toggle-off); border-radius: 10px; position: relative; transition: background .2s; flex-shrink: 0; }
    .toggle-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform .2s; }
    .toggle-wrap input:checked + .toggle-track { background: var(--toggle-on); }
    .toggle-wrap input:checked + .toggle-track::after { transform: translateX(14px); }

    .theme-toggle { background: none; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .theme-toggle:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Noida Property Dashboard</h1>
      <p>Aggregated from 99acres, MagicBricks, SquareYards, OLX, Proptiger</p>
    </div>
    <button class="theme-toggle" id="theme-toggle">🌙 Dark</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="filters" id="filters">
    <div><label>Site Toggles</label><br><div class="toggles" id="f-toggles"></div></div>
    <div><label>BHK</label><br><select id="f-bhk"><option value="">All</option></select></div>
    <div><label>Min Price (₹)</label><br><input id="f-min-price" type="number" placeholder="0"></div>
    <div><label>Max Price (₹)</label><br><input id="f-max-price" type="number" placeholder="∞"></div>
    <div><label>Min Area (sqft)</label><br><input id="f-min-area" type="number" placeholder="0"></div>
    <div><label>Search</label><br><input id="f-search" type="text" placeholder="locality, building..."></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">No properties match your filters.</div>

  <script>
    const SITE_URLS = {
      '99acres': 'https://www.99acres.com',
      'magicbricks': 'https://www.magicbricks.com',
      'squareyards': 'https://www.squareyards.com',
      'olx': 'https://www.olx.in',
      'proptiger': 'https://www.proptiger.com'
    };

    let allProps = [];
    let activeSites = new Set();

    async function loadData() {
      try {
        const resp = await fetch('data.json');
        if (resp.ok) {
          allProps = await resp.json();
        }
      } catch {}
      populateFilters();
      render();
    }

    function populateFilters() {
      const siteSet = [...new Set(allProps.map(p => p.site_name))].sort();
      const bhkSet = [...new Set(allProps.map(p => p.bedrooms).filter(Boolean))].sort((a,b) => a-b);
      const container = document.getElementById('f-toggles');
      const fBhk = document.getElementById('f-bhk');

      activeSites = new Set(siteSet);
      siteSet.forEach(s => {
        const label = document.createElement('label');
        label.className = 'toggle-wrap';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = true;
        cb.dataset.site = s;
        cb.addEventListener('change', () => {
          if (cb.checked) activeSites.add(s); else activeSites.delete(s);
          render();
        });
        const track = document.createElement('span');
        track.className = 'toggle-track';
        label.appendChild(cb);
        label.appendChild(track);
        label.append(' ' + s);
        container.appendChild(label);
      });

      bhkSet.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b + ' BHK'; fBhk.appendChild(o); });
    }

    function getFilters() {
      return {
        site: null,
        bhk: document.getElementById('f-bhk').value,
        minPrice: Number(document.getElementById('f-min-price').value) || 0,
        maxPrice: Number(document.getElementById('f-max-price').value) || Infinity,
        minArea: Number(document.getElementById('f-min-area').value) || 0,
        search: document.getElementById('f-search').value.toLowerCase()
      };
    }

    function matches(p, f) {
      if (!activeSites.has(p.site_name)) return false;
      if (f.bhk && String(p.bedrooms) !== f.bhk) return false;
      if (p.price_raw < f.minPrice) return false;
      if (p.price_raw > f.maxPrice) return false;
      if (p.super_area && p.super_area < f.minArea) return false;
      if (f.search) {
        const hay = [p.locality, p.building_name, p.society_name, p.title, p.city].join(' ').toLowerCase();
        if (!hay.includes(f.search)) return false;
      }
      return true;
    }

    function fmtPrice(raw) {
      if (!raw) return '—';
      if (raw >= 10000000) return (raw / 10000000).toFixed(2) + ' Cr';
      if (raw >= 100000) return (raw / 100000).toFixed(1) + ' L';
      return '₹' + raw.toLocaleString();
    }

    function render() {
      const f = getFilters();
      const filtered = allProps.filter(p => matches(p, f));
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');

      // Stats
      const stats = document.getElementById('stats');
      const sites = [...new Set(allProps.map(p => p.site_name))];
      const avgPrice = filtered.length ? filtered.reduce((s,p) => s + (p.price_raw||0), 0) / filtered.length : 0;
      const avgArea = filtered.filter(p=>p.super_area).length ? filtered.filter(p=>p.super_area).reduce((s,p) => s + p.super_area, 0) / filtered.filter(p=>p.super_area).length : 0;
      stats.innerHTML = `
        <div class="stat"><div class="label">Total</div><div class="value">${allProps.length}</div></div>
        <div class="stat"><div class="label">Filtered</div><div class="value">${filtered.length}</div></div>
        <div class="stat"><div class="label">Sites</div><div class="value">${sites.length}</div></div>
        <div class="stat"><div class="label">Avg Price</div><div class="value">${fmtPrice(avgPrice)}</div></div>
        <div class="stat"><div class="label">Avg Area</div><div class="value">${avgArea ? Math.round(avgArea) + ' sf' : '—'}</div></div>
      `;

      if (!filtered.length) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      grid.innerHTML = filtered.map(p => {
        const url = p.listing_url ? (SITE_URLS[p.site_name] || '#') + p.listing_url : '#';
        const meta = [
          p.bedrooms ? p.bedrooms + ' BHK' : '',
          p.bathrooms ? p.bathrooms + ' Bath' : '',
          p.super_area ? p.super_area + ' sqft' : '',
          p.floor ? 'Floor ' + p.floor + (p.total_floors ? '/' + p.total_floors : '') : ''
        ].filter(Boolean);
        return `
          <div class="card">
            <div class="card-top">
              <div class="card-price">${fmtPrice(p.price_raw)}</div>
              <div class="card-site">${p.site_name}</div>
            </div>
            <div class="card-title">${p.title || '—'}</div>
            <div class="card-meta">${meta.map(m => '<span class="tag">' + m + '</span>').join('')}</div>
            <div class="card-desc">${p.description || ''}</div>
            <div class="card-footer">
              <a href="${url}" target="_blank" rel="noopener">View on ${p.site_name} →</a>
              <span class="date">${p.scraped_at ? new Date(p.scraped_at).toLocaleDateString() : ''}</span>
            </div>
          </div>`;
      }).join('');
    }

    document.querySelectorAll('#filters select, #filters input').forEach(el => {
      el.addEventListener('change', render);
      el.addEventListener('input', render);
    });

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      document.getElementById('theme-toggle').textContent = isLight ? '☀️ Light' : '🌙 Dark';
    });

    loadData();
  </script>
</body>
</html>
