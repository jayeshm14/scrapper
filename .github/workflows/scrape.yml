name: Scrape & Deploy

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs output

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python main.py --all
        env:
          PYTHONUNBUFFERED: 1

      - name: Build dashboard data
        run: node dashboard/build-data.js

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: |
          TOKEN="${{ vars.CLOUDFLARE_API_TOKEN }}"
          ACCOUNT="${{ vars.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Token length: ${#TOKEN}"
          echo "Account: $ACCOUNT"
          if [ ${#TOKEN} -lt 10 ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN is too short or empty!"
            echo "Current token length: ${#TOKEN}"
            echo "Set it at: https://github.com/jayeshm14/scrapper/settings/variables/actions"
            exit 1
          fi
          CLOUDFLARE_API_TOKEN="$TOKEN" wrangler pages deploy dashboard --project-name noida-property-dashboard --commit-dirty=true