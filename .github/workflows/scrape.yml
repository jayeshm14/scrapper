name: Scrape & Deploy

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs output

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python main.py --all
        env:
          PYTHONUNBUFFERED: 1

      - name: Build dashboard data
        run: node dashboard/build-data.js

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN secret is NOT set!"
            echo "Go to: https://github.com/jayeshm14/scrapper/settings/secrets/actions"
            exit 1
          fi
          echo "Token prefix: ${CLOUDFLARE_API_TOKEN:0:5}..."
          wrangler pages deploy dashboard --project-name noida-property-dashboard --commit-dirty=true