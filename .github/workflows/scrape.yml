name: Scrape & Deploy

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs output

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python main.py --all
        env:
          PYTHONUNBUFFERED: 1

      - name: Build dashboard data
        run: node dashboard/build-data.js

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Debug secrets
        run: |
          echo "=== Checking repo secrets via API ==="
          gh api repos/jayeshm14/scrapper/actions/secrets --jq '.secrets[].name' 2>&1 || echo "API check failed"
          echo "=== Checking vars ==="
          gh api repos/jayeshm14/scrapper/actions/variables --jq '.variables[].name' 2>&1 || echo "API check failed"
          echo "=== Environment check ==="
          gh api repos/jayeshm14/scrapper/environments 2>&1 --jq '.environments[].name' || echo "No environments"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Deploy to Cloudflare Pages
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Token length: ${#CF_TOKEN}"
          if [ ${#CF_TOKEN} -lt 5 ]; then
            echo "Token still empty. Your repo is at: jayeshm14/scrapper"
            echo "EXACT URL to add secrets:"
            echo "https://github.com/jayeshm14/scrapper/settings/secrets/actions"
            echo "Click 'New repository secret' on the Secrets tab"
            exit 1
          fi
          CLOUDFLARE_API_TOKEN="$CF_TOKEN" wrangler pages deploy dashboard --project-name noida-property-dashboard --commit-dirty=true