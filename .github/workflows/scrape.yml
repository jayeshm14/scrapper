name: Scrape & Deploy

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p logs output

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python main.py --all
        env:
          PYTHONUNBUFFERED: 1

      - name: Build dashboard data
        run: node dashboard/build-data.js

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Bash check - token length: ${#CF_TOKEN}"
          if [ -z "$CF_TOKEN" ]; then
            echo "Still empty. Please delete and re-add the secret at:"
            echo "https://github.com/jayeshm14/scrapper/settings/secrets/actions"
            echo "Name must be exactly: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          echo "Token starts with: ${CF_TOKEN:0:5}"
          CLOUDFLARE_API_TOKEN="$CF_TOKEN" wrangler pages deploy dashboard --project-name noida-property-dashboard --commit-dirty=true